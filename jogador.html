<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0a0c; color: white; text-align: center; font-family: sans-serif; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .caixa { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #d4af37; width: 85%; }
        input { width: 90%; padding: 15px; margin: 15px 0; border-radius: 8px; border: none; font-size: 1.1rem; }
        button { background: #d4af37; color: black; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1.1rem; }
        #tela-jogo { display:none; }
        .card { width: 300px; height: 450px; background: #e3d5b8; border: 5px solid #d4af37; border-radius: 20px; position: relative; color: #222; overflow: hidden; }
        .cover { position: absolute; top:0; left:0; width:100%; height:100%; background: #5d2e0a; color: #d4af37; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; z-index: 10; transition: 0.5s; }
        .card:active .cover { transform: translateY(-100%); }
        .secret { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    </style>
</head>
<body>

    <div id="tela-login" class="caixa">
        <h1 style="color:#d4af37">JERUSALÉM</h1>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <button onclick="conectar()">ENTRAR NO JOGO</button>
        <p id="status" style="color: #666; font-size: 0.8rem; margin-top:10px;">Aguardando QR Code...</p>
    </div>

    <div id="tela-espera" style="display:none;">
        <h2 style="color:#d4af37">VOCÊ ESTÁ NA SALA!</h2>
        <p>Aguarde o Mestre iniciar a partida...</p>
        <div style="font-size: 0.8rem; color: #555;">Mantenha esta aba aberta.</div>
    </div>

    <div id="tela-jogo">
        <div class="card">
            <div class="cover">SEGURE PARA VER</div>
            <div class="secret">
                <p>SEU PAPEL É:</p>
                <h1 id="meu-papel" style="font-size: 3.5rem; margin:0;"></h1>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const salaID = params.get('sala');
        const peer = new Peer();
        let conexao;

        function conectar() {
            const nomeInput = document.getElementById('nome').value;
            if(!nomeInput) return alert("Coloque seu nome!");
            if(!salaID) return alert("Link inválido!");

            document.getElementById('status').innerText = "Conectando...";

            conexao = peer.connect(salaID);

            conexao.on('open', () => {
                conexao.send({ tipo: 'ENTRAR', nome: nomeInput });
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-espera').style.display = 'block';
            });

            conexao.on('data', (data) => {
                if(data.comando === 'START') {
                    document.getElementById('tela-espera').style.display = 'none';
                    document.getElementById('tela-jogo').style.display = 'block';
                    document.getElementById('meu-papel').innerText = data.papel;
                }
                if(data.comando === 'VOLTAR_ESPERA') {
                    document.getElementById('tela-jogo').style.display = 'none';
                    document.getElementById('tela-espera').style.display = 'block';
                }
            });

            peer.on('error', (err) => {
                alert("Erro: " + err.type);
                document.getElementById('status').innerText = "Falha ao conectar.";
            });
        }
    </script>
</body>
</html>
