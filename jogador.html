<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0a0c; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .card { width: 280px; height: 400px; background: #e3d5b8; margin: 0 auto; border-radius: 15px; position: relative; overflow: hidden; border: 4px solid #d4af37; display:none; }
        .cover { position: absolute; top:0; left:0; width:100%; height:100%; background: #5d2e0a; z-index:2; transition: 0.5s; display:flex; align-items:center; justify-content:center; color:#d4af37; font-weight:bold; }
        .card:active .cover { transform: translateY(-95%); }
        .secret { position: absolute; width:100%; height:100%; color:#222; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div id="login">
        <h2>ENTRAR NA SALA</h2>
        <input type="text" id="nome" placeholder="Seu Nome" style="padding:15px; border-radius:10px;"><br><br>
        <button onclick="conectar()" style="padding:15px 30px; background:#d4af37; border:none; font-weight:bold; border-radius:10px;">CONECTAR</button>
    </div>

    <div id="espera" style="display:none;">
        <h3>Você está na fila!</h3>
        <p>Aguarde o Mestre começar...</p>
    </div>

    <div id="jogo" class="card">
        <div class="cover">SEGURE PARA REVELAR</div>
        <div class="secret">
            <p>VOCÊ É:</p>
            <h1 id="papel"></h1>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const salaID = urlParams.get('sala');
        const peer = new Peer();

        function conectar() {
            const nome = document.getElementById('nome').value;
            const conn = peer.connect(salaID);

            conn.on('open', () => {
                conn.send({ tipo: 'ENTRAR', nome: nome });
                document.getElementById('login').style.display = 'none';
                document.getElementById('espera').style.display = 'block';
            });

            conn.on('data', (data) => {
                if (data.comando === 'START') {
                    document.getElementById('espera').style.display = 'none';
                    document.getElementById('jogo').style.display = 'block';
                    document.getElementById('papel').innerText = data.papel;
                }
            });
        }
    </script>
</body>
</html>
