<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SERVIDOR JERUSALÉM</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .painel { border: 3px solid #d4af37; display: inline-block; padding: 30px; border-radius: 20px; background: #111; }
        #qrcode { background: white; padding: 15px; display: inline-block; border-radius: 10px; margin: 20px; }
        .contador { font-size: 3rem; color: #d4af37; font-weight: bold; }
        button { background: #d4af37; padding: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="painel">
        <h1>SERVIDOR JERUSALÉM</h1>
        <div id="setup">
            <p>Quantidade de Jogadores:</p>
            <input type="number" id="vagas" value="2" style="padding:10px; width:50px;">
            <button onclick="configurar()">GERAR QR CODE</button>
        </div>

        <div id="lobby" style="display:none;">
            <div id="qrcode"></div>
            <div class="contador"><span id="total">0</span> / <span id="max">2</span></div>
            <p id="status-link" style="font-size: 0.8rem; color: #888;"></p>
            <button id="btn-start" onclick="comecar()" disabled>AGUARDANDO...</button>
        </div>
    </div>

    <script>
        let peer;
        let conexoes = [];
        let limite = 2;

        function configurar() {
            limite = document.getElementById('vagas').value;
            document.getElementById('max').innerText = limite;
            
            // Criando ID da sala
            const salaID = "SALA-" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(salaID);

            peer.on('open', (id) => {
                // LINK CORRIGIDO BASEADO NAS SUAS FOTOS
                const linkBase = "https://code-archive-dev.github.io/jerusalem-dorme/jogador.html";
                const linkFinal = linkBase + "?sala=" + id;
                
                // Limpa e gera o QR Code
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), linkFinal);
                document.getElementById('status-link').innerText = "Link: " + linkFinal;

                document.getElementById('setup').style.display = 'none';
                document.getElementById('lobby').style.display = 'block';
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    conn.on('data', (data) => {
                        if (data.tipo === 'ENTRAR') {
                            conexoes.push({ conn, nome: data.nome });
                            document.getElementById('total').innerText = conexoes.length;
                            if(conexoes.length >= limite) {
                                document.getElementById('btn-start').disabled = false;
                                document.getElementById('btn-start').innerText = "INICIAR JOGO!";
                            }
                        }
                    });
                });
            });
        }

       // Função que embaralha e inicia (Sorteio Justo)
        function comecar() {
            let listaPapeis = ["JUDAS", "JESUS", "ANJO"];
            while (listaPapeis.length < conexoes.length) {
                listaPapeis.push("POVO");
            }

            // Embaralha para ninguém saber quem é quem (Fisher-Yates)
            for (let i = listaPapeis.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [listaPapeis[i], listaPapeis[j]] = [listaPapeis[j], listaPapeis[i]];
            }

            conexoes.forEach((p, i) => {
                p.conn.send({ comando: 'START', papel: listaPapeis[i] });
            });

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('painel-narrador').style.display = 'block';
        }


        function resetarPartida() {
            conexoes.forEach(p => {
                p.conn.send({ comando: 'VOLTAR_ESPERA' });
            });

            passoAtual = 0; // Reinicia o roteiro do narrador
            document.getElementById('painel-narrador').style.display = 'none';
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('btn-start').innerText = "INICIAR NOVA RODADA";
        }
    </script>
</body>
</html>
